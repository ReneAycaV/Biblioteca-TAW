<div class="horario-card-wrapper">

    <div class="table-responsive">
        <table class="horario-table">
            
            <thead>
                <tr>
                    <th class="hora-col">Hora</th>
                    <th *ngFor="let dia of dias">{{ dia }}</th>
                </tr>
            </thead>
            
            <tbody>
                <tr *ngFor="let hora of horas">
                    <td class="hora-cell">{{ hora }}</td>
                    
                    <td *ngFor="let dia of dias" 
                        class="bloque-cell"
                        [class.agotado]="esAgotado(dia, hora)"
                        [class.seleccionado]="esSeleccionado(dia, hora)"
                        [class.disponible]="!esAgotado(dia, hora) && !esSeleccionado(dia, hora)"
                        (click)="seleccionarCelda(dia, hora)">
                        
                        <span class="status-text" *ngIf="esAgotado(dia, hora)">Sin cupo</span>
                        <span class="status-text" *ngIf="esSeleccionado(dia, hora)">Seleccionado</span>
                        <span class="status-text" *ngIf="!esAgotado(dia, hora) && !esSeleccionado(dia, hora)">Salas Disponibles</span>
                        
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
